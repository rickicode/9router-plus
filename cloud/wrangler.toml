name = "9router"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[alias]
"@/lib/usageDb.js" = "./src/stubs/usageDb.js"
"undici" = "./src/stubs/undici.js"

# R2 bucket for all data (providers, settings, usage, backups)
[[r2_buckets]]
binding = "R2_DATA"
bucket_name = "9router-data"
