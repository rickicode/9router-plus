name: Build Go Proxy Binaries

on:
  release:
    types: [created]
  push:
    tags:
      - "go-proxy-v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Go Proxy
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/go-proxy-v')
    
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            output: go-proxy-linux-amd64
          - goos: linux
            goarch: arm64
            output: go-proxy-linux-arm64
          
          # macOS
          - goos: darwin
            goarch: amd64
            output: go-proxy-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: go-proxy-darwin-arm64
          
          # Windows
          - goos: windows
            goarch: amd64
            output: go-proxy-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: go-proxy-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go-proxy/go.mod

      - name: Build binary
        working-directory: ./go-proxy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -trimpath -ldflags="-s -w" -o ../dist/${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 7

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/go-proxy-v')
    
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get release
        id: get_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              return release.data.id;
            } catch (error) {
              // Create release if it doesn't exist
              const newRelease = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Go Proxy ${tag}`,
                draft: false,
                prerelease: tag.includes('-')
              });
              return newRelease.data.id;
            }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/go-proxy-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
